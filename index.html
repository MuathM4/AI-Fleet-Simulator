<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم أسطول النقل | A'id Transport</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #1a1a1a; color: #fff; margin: 20px; }
        .dashboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-top: 20px; }
        .card { background-color: #2d2d2d; padding: 20px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.2); text-align: center; border-top: 4px solid #00adb5; }
        .card h3 { margin: 0; color: #aaaaaa; font-size: 14px; }
        .card p { margin: 10px 0 0 0; font-size: 28px; font-weight: bold; color: #00adb5; }
        .status { padding: 10px; border-radius: 5px; text-align: center; font-weight: bold; margin-bottom: 20px; }
        .online { background-color: #2e7d32; }
        .offline { background-color: #c62828; }
    </style>
</head>
<body>

    <h2>لوحة مراقبة الشاحنة الحية (Fleet Telematics)</h2>
    <div id="connection-status" class="status offline">جاري الاتصال بالسيرفر المحّلي...</div>

    <div class="dashboard">
        <div class="card">
            <h3>معرّف الشاحنة</h3>
            <p id="truck-id">--</p>
        </div>
        <div class="card">
            <h3>السرعة (كم/ساعة)</h3>
            <p id="speed">0</p>
        </div>
        <div class="card">
            <h3>ناقل الحركة (Gear)</h3>
            <p id="gear">0</p>
        </div>
        <div class="card">
            <h3>دوران المحرك (RPM)</h3>
            <p id="rpm">0</p>
        </div>
        <div class="card">
            <h3>مستوى الوقود (لتر)</h3>
            <p id="fuel">0</p>
        </div>
    </div>

    <script>
        const API_URL = "http://127.0.0.1:5000/api/fleet/telemetry";

        async function fetchTelemetry() {
            try {
                const response = await fetch(API_URL);
                if (response.status === 200) {
                    const data = await response.json();
                    
                    if (data.isGameConnected) {
                        document.getElementById("connection-status").className = "status online";
                        document.getElementById("connection-status").innerText = "البث الحي نشط ومستقر";
                        
                        document.getElementById("truck-id").innerText = data.truck_id;
                        document.getElementById("speed").innerText = data.telemetry.speed;
                        document.getElementById("gear").innerText = data.telemetry.gear;
                        document.getElementById("rpm").innerText = data.telemetry.engine_rpm;
                        document.getElementById("fuel").innerText = data.telemetry.fuel_liters;
                    } else {
                        document.getElementById("connection-status").className = "status offline";
                        document.getElementById("connection-status").innerText = "اللعبة تعمل لكنك خارج طور القيادة";
                    }
                }
            } catch (error) {
                document.getElementById("connection-status").className = "status offline";
                document.getElementById("connection-status").innerText = "فشل الاتصال بسيرفر البايثون الداخلي";
            }
        }

        // عمل Polling بمعدل مرتين في الثانية (500ms) لمطابقة الـ Sampling Rate الخاص بالـ Backend
        setInterval(fetchTelemetry, 500);
    </script>
</body>
</html>
